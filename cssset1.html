<!DOCTYPE html>
<html>
<head>
    <title>CSS Practice</title>

    <!-- Q3: Internal CSS (<style> tag) -->
    <style>
        /* Q2 */
        .heading {
            color: red;
        }

        /* Q3 - blue button using <style> tag */
        .blueBtn {
            background-color: blue;
            color: white;
        }
    </style>

    <!-- Q3: External CSS stylesheet -->
    <link rel="stylesheet" href="cssset1.css">
</head>

<body>

    <!-- Q1 -->
    <div id="box" style="background-color: blue; color:white;">
        This is a simple div with id "box".
    </div>

    <hr>

    <!-- Q2 -->
    <h1 class="heading">Heading 1</h1>
    <h2 class="heading">Heading 2</h2>
    <h3 class="heading">Heading 3</h3>

    <hr>

    <!-- Q3 -->
    <!-- Green button using external stylesheet -->
    <button id="we" >Green Button</button>

    <!-- Blue button using <style> tag -->
    <button class="blueBtn">Blue Button</button>

    <!-- Pink button using inline style -->
    <button style="background-color:pink;">Pink Button</button>

</body>
</html>
