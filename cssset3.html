<!DOCTYPE html>
<html>
<head>
    <title>Navbar Practice</title>

    <style>

        /* Navbar styling */
        #navbar {
            height: 60px;
            background-color: #0f1111;
        }

        /* Amazon logo text */
        #logo {
            color: #f08804;
            font-size: 25px;
        }

        /* Links */
        a {
            margin-right: 200px;
            text-decoration: none;
            color: white;
        }

        /* Search button */
        button {
            background-color: #f08804;
        }

    </style>
</head>

<body>

    <div id="navbar">
        <a id="logo">amazon.in</a>
        <a href="#">Account</a>
        <a href="#">My Cart</a>
        <a href="#">Contact Us</a>

        <input placeholder="search Amazon.in">
        <button>Search</button>
    </div>

</body>
</html>
