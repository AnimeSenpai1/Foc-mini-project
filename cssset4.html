<!DOCTYPE html>
<html>
<head>
    <title>Practice Set 4</title>

    <style>

        /* Navbar (Previous Question) */
        #navbar {
            height: 60px;
            background-color: #0f1111;
        }

        #logo {
            color: #f08804;
            font-size: 25px;
        }

        a {
            margin-right: 200px;
            color: white;
            text-decoration: none;
        }

        button {
            background-color: #f08804;
        }

        /* Header */
        header {
            border: 2px solid black;
        }

        /* Content Area */
        #content {
            height: 300px; /* Q4 appropriate height */
            border: 2px solid black;
        }

        /* Div boxes */
        .box {
            height: 100px;
            width: 100px;
            border: 2px solid black;
            display: inline-block;
        }

        /* Q3 Different colors with opacity */
        #box1 {
            background-color: red;
            opacity: 0.5;
        }

        #box2 {
            background-color: green;
            opacity: 0.5;
        }

        #box3 {
            background-color: blue;
            opacity: 0.5;
        }

        /* Footer */
        footer {
            border: 2px solid black;
            text-align: center;
        }

    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div id="navbar">
            <a id="logo">amazon.in</a>
            <a href="#">Account</a>
            <a href="#">My Cart</a>
            <a href="#">Contact Us</a>
            <input placeholder="search Amazon.in">
            <button>Search</button>
        </div>
    </header>

    <!-- CONTENT AREA -->
    <div id="content">
        <div id="box1" class="box"></div>
        <div id="box2" class="box"></div>
        <div id="box3" class="box"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        Made with ♥ using HTML & CSS
    </footer>

</body>
</html>
